<!DOCTYPE html>

<head>

<div id="edl-utility"></div>

<div class="page">

  <section class="page-hero">
    <div class="container">
      <p class="eyebrow" data-i18n="nav.ourServices">Our Services</p>
      <h1 data-i18n="pg.implants.title"></h1>
      <p class="lead" data-i18n="pg.implants.sub"></p>
    </div>
  </section>

  <section class="section">
    <div class="container page-grid">
      <div class="page-copy">
        <p data-i18n="pg.implants.p1"></p>
        <h3 data-i18n="pg.whatWeOffer">What we offer</h3>
        <ul class="check-list">
          <li data-i18n="pg.implants.li1"></li>
          <li data-i18n="pg.implants.li2"></li>
          <li data-i18n="pg.implants.li3"></li>

      <div class="page-media">

              <figure><img src="../assets/img/implants-3.jpg" alt="Screw-retained implant bridge on a lower arch model" loading="lazy"></figure>

            </div>
          </div>
          <button class="car-prev" type="button" aria-label="Previous photo">&#8249;</button>
          <button class="car-next" type="button" aria-label="Next photo">&#8250;</button>
          <p class="car-caption" data-i18n="pg.caseCaption">Actual case from our lab</p>

  <section class="section section-alt page-cta">
    <div class="container">
      <h2 data-i18n="pg.ctaTitle">Ready to send a case?</h2>
      <p class="section-sub" data-i18n="pg.ctaSub">Call us at 410-667-7773 or send your first case today.</p>
      <a class="btn btn-primary btn-lg" href="../index.html#send" data-i18n="hero.cta1">Send Us a Case</a>
